name: Daily Auto Update & Deploy

on:
  # 每天北京时间08:00自动执行（UTC 00:00）
  schedule:
    - cron: '0 0 * * *'
  # 手动触发
  workflow_dispatch:

# 写权限：允许提交和推送数据更新
permissions:
  contents: write
  pages: write
  id-token: write

# 独立的并发组，不与 push-triggered deploy 冲突
concurrency:
  group: daily-update-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  update-data-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 检出代码（含完整历史，便于 push）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 设置Python环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      # 4. 运行数据抓取脚本（仅抓取和更新JSON/HTML，跳过git push）
      - name: Run data update
        run: |
          python auto_update.py
        env:
          TZ: Asia/Shanghai
          CI: true          # auto_update.py 检测到 CI=true 时跳过自带的 git push

      # 5. 提交并推送更新后的数据文件
      - name: Commit and push updates
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "auto: 每日数据更新 $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
            git push origin master
            echo "✅ 数据已提交并推送"
          else
            echo "ℹ️ 无文件变更，跳过提交"
          fi

      # 6. 部署到GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 7. 输出摘要
      - name: Summary
        run: |
          echo "## ✅ 每日自动更新完成" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 内容 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 执行时间 | $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S CST') |" >> $GITHUB_STEP_SUMMARY
          echo "| 报告地址 | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发方式 | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
